name: Validate

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      github_actions: ${{ steps.filter.outputs.github_actions }}
      rust_checks: ${{ steps.filter.outputs.rust_checks }}
      ui-build: ${{ steps.filter.outputs.ui-build }}
      ui-tests: ${{ steps.filter.outputs.ui-tests }}
      ui-screencasts: ${{ steps.filter.outputs.ui-screencasts }}
      proto-lint: ${{ steps.filter.outputs.proto-lint }}
      source-lint: ${{ steps.filter.outputs.source-lint }}
      docs-freshness: ${{ steps.filter.outputs.docs-freshness }}
      license-check: ${{ steps.filter.outputs.license-check }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: true

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            github_actions:
              - '.github/workflows/**'
            rust_checks:
              - '.github/workflows/validate.yml'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Makefile'
              - 'rust-toolchain.toml'
              - 'rust-toolchain'
              - 'crates/**'
              - 'xtask/**'
            ui-build:
              - '.github/workflows/validate.yml'
              - 'crates/coral-api/proto/**'
              - 'ui/**'
            ui-tests:
              - '.github/workflows/validate.yml'
              - 'crates/coral-api/proto/**'
              - 'ui/**'
            ui-screencasts:
              - '.github/workflows/validate.yml'
              - 'crates/coral-api/proto/**'
              - 'ui/**'
            proto-lint:
              - '.github/workflows/validate.yml'
              - 'Makefile'
              - 'crates/coral-api/buf.yaml'
              - 'crates/coral-api/proto/**/*.proto'
            source-lint:
              - '.github/workflows/validate.yml'
              - '.yamllint.yaml'
              - 'Makefile'
              - 'sources/**/*.yaml'
              - 'sources/**/*.yml'
            docs-freshness:
              - '.github/workflows/validate.yml'
              - 'Makefile'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'xtask/**'
              - 'crates/coral-spec/**'
              - 'sources/**'
              - 'docs/**'
              - 'CHANGELOG.md'
            license-check:
              - '.github/workflows/validate.yml'
              - 'Makefile'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**/Cargo.toml'
              - 'deny.toml'

  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.rust_checks == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: coral-validate-${{ runner.os }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run make rust-checks
        run: make rust-checks

  ui-build:
    name: UI build
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.ui-build == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Build UI
        run: npm run build --prefix ui

      - name: Verify production build excludes test mocks
        run: |
          if grep -R -E 'mockServiceWorker|setupWorker|@msw/playwright|mockScenario|PW_UI_SCREENCAST' ui/dist; then
            echo 'Production UI build contains test/mock-only code' >&2
            exit 1
          fi

  ui-tests:
    name: UI tests
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.ui-tests == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Type-check UI tests
        run: npm run test:ui:type-check --prefix ui

      - name: Install Chromium for Playwright
        run: npm exec --prefix ui -- playwright install --with-deps chromium

      - name: Run UI tests
        run: npm run test:ui --prefix ui

      - name: Upload UI test artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ui-test-results
          path: |
            ui/test-results/**
            ui/playwright-report/**
          if-no-files-found: ignore

  ui-screencasts:
    name: UI screencasts for changed tests
    runs-on: ubuntu-latest
    needs: changes
    continue-on-error: true
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.ui-screencasts == 'true' }}
    permissions:
      contents: read
    outputs:
      artifact-url: ${{ steps.upload-screencasts.outputs.artifact-url }}
      primary-artifact-url: ${{ steps.upload-primary-screencast.outputs.artifact-url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci --prefix ui

      - name: Type-check UI tests
        run: npm run test:ui:type-check --prefix ui

      - name: Install Chromium for Playwright
        run: npm exec --prefix ui -- playwright install --with-deps chromium

      - name: Ensure ffmpeg is available
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version

      - name: Record screencasts for changed or related UI tests
        env:
          PW_UI_DIFF_BASE: ${{ github.event.pull_request.base.sha }}
        run: npm run test:ui:screencast:ci --prefix ui

      - name: Convert screencasts to MP4
        if: ${{ always() }}
        run: |
          find ui/test-results -name '*.webm' -print0 |
            while IFS= read -r -d '' file; do
              ffmpeg -nostdin -y -i "$file" \
                -c:v libx264 -pix_fmt yuv420p -movflags +faststart \
                "${file%.webm}.mp4"
            done

      - name: Select primary MP4 screencast
        if: ${{ always() }}
        run: |
          primary=$(find ui/test-results -name '*.mp4' -type f -printf '%s %p\n' | sort -nr | head -n 1 | cut -d' ' -f2-)
          if [ -z "$primary" ]; then
            echo 'No MP4 screencast found to upload as primary video' >&2
            exit 1
          fi
          mkdir -p ui/test-results/primary
          cp "$primary" ui/test-results/primary/coral-ui-screencast.mp4
          echo "Primary MP4 screencast: $primary"

      - name: Upload primary MP4 screencast
        id: upload-primary-screencast
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: ui/test-results/primary/coral-ui-screencast.mp4
          archive: false
          if-no-files-found: error
          retention-days: 14

      - name: Upload changed UI screencast bundle
        id: upload-screencasts
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ui-screencasts-${{ github.event.pull_request.number }}
          path: |
            ui/test-results/**/*.mp4
            ui/test-results/**/*.webm
            ui/test-results/screencast-selection.json
            !ui/test-results/primary/coral-ui-screencast.mp4
          if-no-files-found: ignore
          retention-days: 14


  ui-screencast-comment:
    name: Comment on UI screencast artifacts
    runs-on: ubuntu-latest
    needs: [ changes, ui-screencasts ]
    continue-on-error: true
    if: ${{ always() && github.event_name == 'pull_request' && needs.changes.outputs.ui-screencasts == 'true' && needs.ui-screencasts.result == 'success' && github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Comment with screencast artifact link
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_URL: ${{ needs.ui-screencasts.outputs.artifact-url }}
          PRIMARY_ARTIFACT_URL: ${{ needs.ui-screencasts.outputs.primary-artifact-url }}
          ARTIFACT_NAME: ui-screencasts-${{ github.event.pull_request.number }}
        run: |
          if [ -z "${PRIMARY_ARTIFACT_URL:-}" ] || [ -z "${ARTIFACT_URL:-}" ]; then
            echo 'Screencast artifact outputs are unavailable; skipping advisory PR comment.'
            exit 0
          fi

          marker='<!-- coral-ui-screencasts -->'
          body=$(cat <<EOF
          $marker
          ## UI screencast artifacts

          The changed/related Playwright UI screencasts for this PR run were uploaded as workflow artifacts.

          - Primary MP4 screencast, unzipped: $PRIMARY_ARTIFACT_URL
          - Full screencast bundle: $ARTIFACT_URL
          - Workflow run artifacts: $RUN_URL#artifacts
          - Bundle contents: MP4 files for GitHub review, original WebM files, and \`screencast-selection.json\` explaining which specs were selected.

          Quick local review:

          \`\`\`sh
          tmp=\$(mktemp -d) && gh run download ${{ github.run_id }} -R ${{ github.repository }} -n coral-ui-screencast.mp4 -D "\$tmp" && open "\$tmp/coral-ui-screencast.mp4"
          \`\`\`

          Full bundle:

          \`\`\`sh
          tmp=\$(mktemp -d) && gh run download ${{ github.run_id }} -R ${{ github.repository }} -n $ARTIFACT_NAME -D "\$tmp" && open "\$tmp"
          \`\`\`

          This comment is updated on each screencast CI run.
          EOF
          )

          existing_comment_id=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | contains("<!-- coral-ui-screencasts -->")) | .id' | head -n 1)

          if [ -n "$existing_comment_id" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/$existing_comment_id" \
              -X PATCH \
              -f body="$body"
          else
            gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
              -f body="$body"
          fi

  proto-lint:
    name: Lint protobuf API
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.proto-lint == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install buf
        run: |
          go install github.com/bufbuild/buf/cmd/buf@v1.69.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run make lint-proto
        run: make lint-proto

  gha-security-audit:
    name: Github Actions security audit with zizmor
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.github_actions == 'true' }}
    permissions:
      security-events: write # Required for upload-sarif (used by zizmor-action) to upload SARIF files.
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          version: v1.25.2
          annotations: ${{ github.event_name == 'pull_request' }}
          advanced-security: ${{ github.event_name != 'pull_request' }}
          min-severity: low

  source-lint:
    name: Lint source manifests
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.source-lint == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: coral-source-lint-${{ runner.os }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install ryl
        run: cargo install ryl --locked

      - name: Run make lint-sources
        run: make lint-sources

  docs-freshness:
    name: Docs freshness check
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.docs-freshness == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: coral-docs-freshness-${{ runner.os }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run make docs-check
        run: make docs-check

  license-check:
    name: Dependency license scan
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.license-check == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: coral-license-check-${{ runner.os }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-deny
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: cargo-deny

      - name: Run make license-check
        run: make license-check

  validate:
    runs-on: ubuntu-latest
    needs: [ changes, rust-checks, ui-build, ui-tests, proto-lint, gha-security-audit, source-lint, docs-freshness, license-check ]
    # Run even when upstream jobs fail or are conditionally skipped so this
    # job can act as the single required status check for the workflow.
    if: ${{ always() }}
    steps:
      - name: Check all job results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          RUST_CHECKS_RESULT: ${{ needs.rust-checks.result }}
          UI_BUILD_RESULT: ${{ needs.ui-build.result }}
          UI_TESTS_RESULT: ${{ needs.ui-tests.result }}
          PROTO_LINT_RESULT: ${{ needs.proto-lint.result }}
          GHA_SECURITY_AUDIT_RESULT: ${{ needs.gha-security-audit.result }}
          SOURCE_LINT_RESULT: ${{ needs.source-lint.result }}
          DOCS_FRESHNESS_RESULT: ${{ needs.docs-freshness.result }}
          LICENSE_CHECK_RESULT: ${{ needs.license-check.result }}
        run: |
          jobs=(
            "changes:$CHANGES_RESULT"
            "rust-checks:$RUST_CHECKS_RESULT"
            "ui-build:$UI_BUILD_RESULT"
            "ui-tests:$UI_TESTS_RESULT"
            "proto-lint:$PROTO_LINT_RESULT"
            "gha-security-audit:$GHA_SECURITY_AUDIT_RESULT"
            "source-lint:$SOURCE_LINT_RESULT"
            "docs-freshness:$DOCS_FRESHNESS_RESULT"
            "license-check:$LICENSE_CHECK_RESULT"
          )

          failed=0
          for job_status in "${jobs[@]}"; do
            job_name="${job_status%%:*}"
            result="${job_status#*:}"

            if [[ -z "$result" ]]; then
              echo "$job_name has no recorded result"
              failed=1
              continue
            fi

            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "$job_name: $result"
              failed=1
            fi
          done

          if [ $failed -eq 1 ]; then
            exit 1
          fi
