name: spotify
version: 0.1.0
dsl_version: 3
backend: http
description: >-
  Query profile, playlists, saved music, top items, and recent listening history
  from Spotify.
base_url: https://api.spotify.com

inputs:
  SPOTIFY_ACCESS_TOKEN:
    kind: secret
    hint: |
      Spotify OAuth 2.0 access token, without a `Bearer ` prefix. For
      interactive setup, choose "Connect with Spotify" and provide a Spotify
      app Client ID that has this redirect URI configured:
      http://127.0.0.1:53682/oauth/callback

      Create or edit an app at https://developer.spotify.com/dashboard.
      Minimum scopes requested by this source are read-only: user-read-private,
      user-read-email, playlist-read-private, playlist-read-collaborative,
      user-library-read, user-top-read, user-read-recently-played, and
      user-read-currently-playing, and user-read-playback-state.
      See https://developer.spotify.com/documentation/web-api/concepts/scopes.
    credential:
      methods:
        - type: oauth
          label: Connect with Spotify
          description: Authorize Spotify with OAuth PKCE and store an access token.
          oauth:
            flow:
              type: authorization_code
              pkce: required
            redirect_uri: http://127.0.0.1:53682/oauth/callback
            redirect_uri_port_mode: fixed
            endpoints:
              authorization_url: https://accounts.spotify.com/authorize
              token_url: https://accounts.spotify.com/api/token
            client:
              id:
                input: SPOTIFY_CLIENT_ID
            scopes:
              scope:
                delimiter: space
                values:
                  - user-read-private
                  - user-read-email
                  - playlist-read-private
                  - playlist-read-collaborative
                  - user-library-read
                  - user-top-read
                  - user-read-recently-played
                  - user-read-currently-playing
                  - user-read-playback-state
        - type: source_config
          label: Paste Spotify access token
          description: Paste an existing Spotify OAuth access token with the required read scopes.

  SPOTIFY_CLIENT_ID:
    kind: variable
    hint: >-
      Spotify app Client ID from https://developer.spotify.com/dashboard. This
      is the public app identifier used for the Authorization Code with PKCE
      flow; add http://127.0.0.1:53682/oauth/callback as the app redirect URI.

auth:
  type: HeaderAuth
  headers:
    - name: Authorization
      from: template
      template: Bearer {{input.SPOTIFY_ACCESS_TOKEN}}

request_headers:
  - name: Accept
    from: literal
    value: application/json

test_queries:
  - SELECT id, display_name, email FROM spotify.profile LIMIT 1
  - SELECT id, name, owner__id FROM spotify.playlists LIMIT 1

functions:
  - name: search_tracks
    kind: search
    description: Provider-ranked Spotify search results for tracks.
    fetch_limit_default: 10
    search_limits:
      default_top_k: 10
      max_top_k: 50
      max_calls_per_query: 1
    args:
      - name: query
        required: true
        bind:
          arg: query
      - name: market
        bind:
          arg: market
    request:
      method: GET
      path: /v1/search
      query:
        - name: q
          from: arg
          key: query
        - name: type
          from: literal
          value: track
        - name: market
          from: arg
          key: market
    response:
      rows_path: [tracks, items]
    pagination:
      mode: offset
      offset_param: offset
      offset_start: 0
      page_size:
        default: 10
        max: 50
        query_param: limit
    columns:
      - name: id
        type: Utf8
        nullable: true
        description: Spotify result ID when Spotify returns one.
      - name: name
        type: Utf8
        nullable: true
        description: Result name.
      - name: type
        type: Utf8
        nullable: true
        description: Spotify object type.
      - name: uri
        type: Utf8
        nullable: true
        description: Spotify URI.
      - name: external_url
        type: Utf8
        nullable: true
        description: Spotify web URL.
        expr:
          kind: path
          path: [external_urls, spotify]

