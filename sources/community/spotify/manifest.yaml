tables:
  - name: profile
    description: Authenticated Spotify user profile and account metadata.
    guide: |
      Use this table to confirm which Spotify user is connected before querying
      library, playlist, or listening-history tables.
    request:
      method: GET
      path: /v1/me
    response:
      row_strategy: direct
    pagination:
      mode: none
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Spotify user ID.
      - name: display_name
        type: Utf8
        nullable: true
        description: User display name.
      - name: email
        type: Utf8
        nullable: true
        description: User email address when the token has user-read-email.
      - name: country
        type: Utf8
        nullable: true
        description: User country code.
      - name: product
        type: Utf8
        nullable: true
        description: Spotify subscription product, such as free or premium.
      - name: followers_total
        type: Int64
        nullable: true
        description: Total Spotify followers for the user.
        expr:
          kind: path
          path: [followers, total]
      - name: href
        type: Utf8
        nullable: true
        description: Web API URL for the user.
      - name: uri
        type: Utf8
        nullable: true
        description: Spotify URI for the user.
      - name: external_url
        type: Utf8
        nullable: true
        description: Spotify web URL for the user.
        expr:
          kind: path
          path: [external_urls, spotify]
      - name: image_url
        type: Utf8
        nullable: true
        description: First profile image URL when available.
        expr:
          kind: first_array_item_path
          path: [images]
          item_path: [url]

  - name: playlists
    description: Playlists owned or followed by the authenticated Spotify user.
    guide: |
      Start here to discover playlist IDs, then pass `id` as the playlist_id
      filter to `spotify.playlist_items`.
    request:
      method: GET
      path: /v1/me/playlists
    response:
      rows_path: [items]
    pagination:
      mode: offset
      offset_param: offset
      offset_start: 0
      page_size:
        default: 50
        max: 50
        query_param: limit
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Spotify playlist ID.
      - name: name
        type: Utf8
        nullable: true
        description: Playlist name.
      - name: description
        type: Utf8
        nullable: true
        description: Playlist description.
      - name: public
        type: Boolean
        nullable: true
        description: Whether the playlist is public on the user's profile.
      - name: collaborative
        type: Boolean
        nullable: true
        description: Whether the playlist is collaborative.
      - name: snapshot_id
        type: Utf8
        nullable: true
        description: Current playlist snapshot identifier.
      - name: owner__id
        type: Utf8
        nullable: true
        description: Spotify user ID of the playlist owner.
        expr:
          kind: path
          path: [owner, id]
      - name: owner__display_name
        type: Utf8
        nullable: true
        description: Display name of the playlist owner.
        expr:
          kind: path
          path: [owner, display_name]
      - name: tracks_total
        type: Int64
        nullable: true
        description: Number of tracks in the playlist.
        expr:
          kind: path
          path: [items, total]
      - name: href
        type: Utf8
        nullable: true
        description: Web API URL for the playlist.
      - name: uri
        type: Utf8
        nullable: true
        description: Spotify URI for the playlist.
      - name: external_url
        type: Utf8
        nullable: true
        description: Spotify web URL for the playlist.
        expr:
          kind: path
          path: [external_urls, spotify]
      - name: image_url
        type: Utf8
        nullable: true
        description: First playlist image URL when available.
        expr:
          kind: first_array_item_path
          path: [images]
          item_path: [url]

  - name: playlist_items
    description: Tracks and episodes in a Spotify playlist.
    guide: |
      Requires `playlist_id`. Get playlist IDs from `spotify.playlists`.
      Spotify only exposes playlist items that the authenticated user can access.
    filters:
      - name: playlist_id
        required: true
      - name: market
        description: Optional ISO 3166-1 alpha-2 country code for relinking and availability.
    request:
      method: GET
      path: /v1/playlists/{{filter.playlist_id}}/items
      query:
        - name: market
          from: filter
          key: market
    response:
      rows_path: [items]
    pagination:
      mode: offset
      offset_param: offset
      offset_start: 0
      page_size:
        default: 50
        max: 50
        query_param: limit
    columns:
      - name: playlist_id
        type: Utf8
        nullable: false
        virtual: true
        description: Playlist ID from the required filter.
        expr:
          kind: from_filter
          key: playlist_id
      - name: market
        type: Utf8
        nullable: true
        virtual: true
        description: Market filter value used for relinking and availability.
        expr:
          kind: from_filter
          key: market
      - name: added_at
        type: Timestamp
        nullable: true
        description: Time when the item was added to the playlist.
        expr:
          kind: format_timestamp
          input: iso8601
          expr:
            kind: path
            path: [added_at]
      - name: added_by__id
        type: Utf8
        nullable: true
        description: Spotify user ID that added the item.
        expr:
          kind: path
          path: [added_by, id]
      - name: is_local
        type: Boolean
        nullable: true
        description: Whether this is a local item.
      - name: track__id
        type: Utf8
        nullable: true
        description: Spotify track or episode ID.
        expr:
          kind: path
          path: [item, id]
      - name: track__name
        type: Utf8
        nullable: true
        description: Track or episode name.
        expr:
          kind: path
          path: [item, name]
      - name: track__type
        type: Utf8
        nullable: true
        description: Spotify item type, such as track or episode.
        expr:
          kind: path
          path: [item, type]
      - name: track__uri
        type: Utf8
        nullable: true
        description: Spotify URI for the item.
        expr:
          kind: path
          path: [item, uri]
      - name: track__duration_ms
        type: Int64
        nullable: true
        description: Track duration in milliseconds.
        expr:
          kind: path
          path: [item, duration_ms]
      - name: track__explicit
        type: Boolean
        nullable: true
        description: Whether Spotify marks the track explicit.
        expr:
          kind: path
          path: [item, explicit]
      - name: album__id
        type: Utf8
        nullable: true
        description: Spotify album ID for tracks.
        expr:
          kind: path
          path: [item, album, id]
      - name: album__name
        type: Utf8
        nullable: true
        description: Album name for tracks.
        expr:
          kind: path
          path: [item, album, name]
      - name: artist_names
        type: Utf8
        nullable: true
        description: Comma-joined artist names for tracks.
        expr:
          kind: join_array_path
          path: [item, artists]
          item_path: [name]
      - name: external_url
        type: Utf8
        nullable: true
        description: Spotify web URL for the item.
        expr:
          kind: path
          path: [item, external_urls, spotify]
      - name: raw_track
        type: Json
        nullable: true
        description: Raw Spotify track or episode object.
        expr:
          kind: path
          path: [item]

  - name: saved_tracks
    description: Tracks saved in the authenticated user's Spotify library.
    guide: |
      Uses the user's saved tracks collection. Requires the user-library-read scope.
    filters:
      - name: market
        description: Optional ISO 3166-1 alpha-2 country code for relinking and availability.
    request:
      method: GET
      path: /v1/me/tracks
      query:
        - name: market
          from: filter
          key: market
    response:
      rows_path: [items]
    pagination:
      mode: offset
      offset_param: offset
      offset_start: 0
      page_size:
        default: 50
        max: 50
        query_param: limit
    columns:
      - name: market
        type: Utf8
        nullable: true
        virtual: true
        description: Market filter value used for relinking and availability.
        expr:
          kind: from_filter
          key: market
      - name: added_at
        type: Timestamp
        nullable: true
        description: Time when the track was saved.
        expr:
          kind: format_timestamp
          input: iso8601
          expr:
            kind: path
            path: [added_at]
      - name: track__id
        type: Utf8
        nullable: false
        description: Spotify track ID.
        expr:
          kind: path
          path: [track, id]
      - name: track__name
        type: Utf8
        nullable: true
        description: Track name.
        expr:
          kind: path
          path: [track, name]
      - name: track__uri
        type: Utf8
        nullable: true
        description: Spotify URI for the track.
        expr:
          kind: path
          path: [track, uri]
      - name: track__duration_ms
        type: Int64
        nullable: true
        description: Track duration in milliseconds.
        expr:
          kind: path
          path: [track, duration_ms]
      - name: track__explicit
        type: Boolean
        nullable: true
        description: Whether Spotify marks the track explicit.
        expr:
          kind: path
          path: [track, explicit]
      - name: album__id
        type: Utf8
        nullable: true
        description: Album ID.
        expr:
          kind: path
          path: [track, album, id]
      - name: album__name
        type: Utf8
        nullable: true
        description: Album name.
        expr:
          kind: path
          path: [track, album, name]
      - name: album__release_date
        type: Utf8
        nullable: true
        description: Album release date as returned by Spotify.
        expr:
          kind: path
          path: [track, album, release_date]
      - name: artist_names
        type: Utf8
        nullable: true
        description: Comma-joined track artist names.
        expr:
          kind: join_array_path
          path: [track, artists]
          item_path: [name]
      - name: external_url
        type: Utf8
        nullable: true
        description: Spotify web URL for the track.
        expr:
          kind: path
          path: [track, external_urls, spotify]
      - name: raw_track
        type: Json
        nullable: true
        description: Raw Spotify track object.
        expr:
          kind: path
          path: [track]

  - name: saved_albums
    description: Albums saved in the authenticated user's Spotify library.
    guide: |
      Uses the user's saved albums collection. Requires the user-library-read scope.
    filters:
      - name: market
        description: Optional ISO 3166-1 alpha-2 country code for relinking and availability.
    request:
      method: GET
      path: /v1/me/albums
      query:
        - name: market
          from: filter
          key: market
    response:
      rows_path: [items]
    pagination:
      mode: offset
      offset_param: offset
      offset_start: 0
      page_size:
        default: 50
        max: 50
        query_param: limit
    columns:
      - name: market
        type: Utf8
        nullable: true
        virtual: true
        description: Market filter value used for relinking and availability.
        expr:
          kind: from_filter
          key: market
      - name: added_at
        type: Timestamp
        nullable: true
        description: Time when the album was saved.
        expr:
          kind: format_timestamp
          input: iso8601
          expr:
            kind: path
            path: [added_at]
      - name: album__id
        type: Utf8
        nullable: false
        description: Spotify album ID.
        expr:
          kind: path
          path: [album, id]
      - name: album__name
        type: Utf8
        nullable: true
