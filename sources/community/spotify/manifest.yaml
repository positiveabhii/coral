        description: Parent Spotify ID.
      - name: market
        description: Optional Spotify API filter.
    request:
      method: GET
      path: /v1/audiobooks/{{filter.audiobook_id}}/chapters
      query:
        - name: market
          from: filter
          key: market
    response:
      rows_path: [items]
    pagination:
      mode: offset
      offset_param: offset
      offset_start: 0
      page_size:
        default: 50
        max: 50
        query_param: limit
    columns:
      - name: audiobook_id
        type: Utf8
        nullable: false
        virtual: true
        description: Parent filter value.
        expr:
          kind: from_filter
          key: audiobook_id
      - name: market
        type: Utf8
        nullable: true
        virtual: true
        description: Filter value used for this request.
        expr:
          kind: from_filter
          key: market
      - name: id
        type: Utf8
        nullable: false
        description: Spotify item ID.
      - name: name
        type: Utf8
        nullable: true
        description: Item name.
