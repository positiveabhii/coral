  - name: recently_played
    description: Recently played Spotify tracks for the authenticated user.
    guide: |
      Returns the most recent play-history items visible to Spotify's Web API.
      Optional `after` and `before` filters are Unix timestamps in milliseconds.
      Requires the user-read-recently-played scope.
    filters:
      - name: after
        description: Return items after this Unix timestamp in milliseconds.
      - name: before
        description: Return items before this Unix timestamp in milliseconds.
    request:
      method: GET
      path: /v1/me/player/recently-played
      query:
        - name: limit
          from: literal
          value: 50
        - name: after
          from: filter
          key: after
        - name: before
          from: filter
          key: before
    response:
      rows_path: [items]
    pagination:
      mode: none
    columns:
      - name: after
        type: Utf8
        nullable: true
        virtual: true
        description: After filter value as a Unix timestamp in milliseconds.
        expr:
          kind: from_filter
          key: after
      - name: before
        type: Utf8
        nullable: true
        virtual: true
        description: Before filter value as a Unix timestamp in milliseconds.
        expr:
          kind: from_filter
          key: before
      - name: played_at
        type: Timestamp
        nullable: false
        description: Time when the track was played.
        expr:
          kind: format_timestamp
          input: iso8601
          expr:
            kind: path
            path: [played_at]
      - name: track__id
        type: Utf8
        nullable: true
        description: Spotify track ID.
        expr:
          kind: path
          path: [track, id]
      - name: track__name
        type: Utf8
        nullable: true
        description: Track name.
        expr:
          kind: path
          path: [track, name]
      - name: track__uri
        type: Utf8
        nullable: true
        description: Spotify URI for the track.
        expr:
          kind: path
          path: [track, uri]
      - name: track__duration_ms
        type: Int64
        nullable: true
        description: Track duration in milliseconds.
        expr:
          kind: path
          path: [track, duration_ms]
      - name: album__id
        type: Utf8
        nullable: true
        description: Album ID.
        expr:
          kind: path
          path: [track, album, id]
      - name: album__name
        type: Utf8
        nullable: true
        description: Album name.
        expr:
          kind: path
          path: [track, album, name]
      - name: artist_names
        type: Utf8
        nullable: true
        description: Comma-joined track artist names.
        expr:
          kind: join_array_path
          path: [track, artists]
          item_path: [name]
      - name: context__type
        type: Utf8
        nullable: true
        description: Playback context type when Spotify returns one.
        expr:
          kind: path
