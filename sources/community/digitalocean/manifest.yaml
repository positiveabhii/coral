  - name: sizes
    description: Available Droplet size plans
    guide: |
      Each row is one Droplet size plan. `slug` is the plan identifier
      used when creating Droplets (e.g. s-1vcpu-1gb). `price_monthly`
      and `price_hourly` are the costs. `available` indicates whether the
      size can currently be used for new Droplets. `regions` is a JSON
      array of region slugs where the size is offered.
    request:
      method: GET
      path: /v2/sizes
    response:
      rows_path:
        - sizes
      allow_404_empty: false
      row_strategy: direct
    pagination:
      mode: page
      page_param: page
      page_start: 1
      page_step: 1
      page_size:
        default: 20
        max: 200
        query_param: per_page
    columns:
      - name: slug
        type: Utf8
        nullable: false
        description: Size slug (e.g. s-1vcpu-1gb, s-2vcpu-4gb)
        expr:
          kind: path
          path:
            - slug
      - name: memory
        type: Int64
        nullable: true
        description: RAM in megabytes
        expr:
          kind: path
          path:
            - memory
      - name: vcpus
        type: Int64
        nullable: true
        description: Number of virtual CPUs
        expr:
          kind: path
          path:
            - vcpus
      - name: disk
        type: Int64
        nullable: true
        description: Disk size in gigabytes
        expr:
          kind: path
          path:
            - disk
      - name: transfer
        type: Float64
        nullable: true
        description: Transfer bandwidth in terabytes
        expr:
          kind: path
          path:
            - transfer
      - name: price_monthly
        type: Float64
        nullable: true
        description: Monthly price in USD
        expr:
          kind: path
          path:
            - price_monthly
      - name: price_hourly
        type: Float64
        nullable: true
        description: Hourly price in USD
        expr:
          kind: path
          path:
            - price_hourly
      - name: available
        type: Boolean
        nullable: true
        description: Whether this size is available for new Droplets
        expr:
          kind: path
          path:
            - available
      - name: description
        type: Utf8
        nullable: true
        description: Human-readable size description
        expr:
          kind: path
          path:
            - description
      - name: regions
        type: Json
        nullable: true
        description: Available region slugs as a JSON array
        expr:
          kind: path
          path:
            - regions
