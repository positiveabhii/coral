  # ──────────────────────────────────────────────────────────────────────
  # status_page_resources — resources on a status page
  # ──────────────────────────────────────────────────────────────────────
  - name: status_page_resources
    description: >
      Lists all resources (monitors/heartbeats) attached to a
      specific status page. Shows which services appear on each
      status page.
    guide: >
      Filter by status_page_id: `SELECT id, resource_id,
      resource_type, public_name, status, availability
      FROM betterstack.status_page_resources
      WHERE status_page_id = '12345'`.
    filters:
      - name: status_page_id
        required: true
    request:
      method: GET
      path: /v2/status-pages/{{filter.status_page_id}}/resources
    response:
      rows_path:
        - data
    pagination:
      mode: page
      page_param: page
      page_start: 1
      page_size:
        default: 50
        max: 250
        query_param: per_page
    columns:
      - name: status_page_id
        type: Utf8
        nullable: false
        virtual: true
        description: Status page ID (from filter).
        expr:
          kind: from_filter
          key: status_page_id
      - name: id
        type: Utf8
        nullable: false
        description: Unique resource identifier.
        expr:
          kind: path
          path:
            - id
      - name: resource_id
        type: Utf8
        nullable: true
        description: ID of the linked monitor or heartbeat.
        expr:
          kind: path
          path:
            - attributes
            - resource_id
      - name: resource_type
        type: Utf8
        nullable: true
        description: >-
          Type of linked resource (Monitor, Heartbeat, etc.).
        expr:
          kind: path
          path:
            - attributes
            - resource_type
      - name: public_name
        type: Utf8
        nullable: true
