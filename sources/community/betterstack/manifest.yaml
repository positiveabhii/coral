        expr:
          kind: path
          path:
            - attributes
            - history
      - name: status
        type: Utf8
        nullable: true
        description: Current status shown on the status page.
        expr:
          kind: path
          path:
            - attributes
            - status
      - name: availability
        type: Float64
        nullable: true
        description: Resource availability ratio.
        expr:
          kind: path
          path:
            - attributes
            - availability
      - name: position
        type: Int64
        nullable: true
        description: Display position on the status page.
        expr:
          kind: path
          path:
            - attributes
