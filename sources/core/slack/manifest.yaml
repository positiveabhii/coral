    pagination:
      mode: cursor_query
      page_size:
        default: 200
        max: 200
        query_param: limit
      cursor_param: cursor
      response_cursor_path:
        - response_metadata
        - next_cursor
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: User ID
        expr:
          kind: path
          path:
            - id
      - name: name
        type: Utf8
        nullable: false
        description: Username
        expr:
          kind: path
          path:
            - name
      - name: real_name
        type: Utf8
        nullable: true
        description: User real name
        expr:
          kind: path
          path:
            - real_name
      - name: display_name
        type: Utf8
        nullable: true
        description: User display name in Slack
        expr:
          kind: path
          path:
            - profile
