name: slack
version: 2.1.1
dsl_version: 3
backend: http
description: >-
  Query channels, messages, thread replies, users, and rich message payloads
  from your Slack workspace.
inputs:
  SLACK_TOKEN:
    kind: secret
    hint: |
      Slack doesn't provide a general-purpose API for reading messages.
      Instead, you need a Slack app with a Bot User OAuth Token.

      If you already have a Slack app with the required scopes, you can
      find your Bot User OAuth Token on its OAuth & Permissions page. The
      required scopes are: channels:read, channels:history, groups:read,
      groups:history, users:read, users:read.email, files:read. Add
      `files:read` if you plan to inspect or download the private file URLs
      exposed in message payloads.

      If you don't have a Slack app, you can
      [create one with the required scopes pre-filled](https://api.slack.com/apps?new_app=1&manifest_json=%7B%22display_information%22%3A%7B%22name%22%3A%22Coral%22%2C%22description%22%3A%22Coral+data+access%22%7D%2C%22oauth_config%22%3A%7B%22scopes%22%3A%7B%22bot%22%3A%5B%22channels%3Aread%22%2C%22groups%3Aread%22%2C%22channels%3Ahistory%22%2C%22groups%3Ahistory%22%2C%22users%3Aread%22%2C%22users%3Aread.email%22%2C%22files%3Aread%22%5D%7D%7D%2C%22features%22%3A%7B%22bot_user%22%3A%7B%22display_name%22%3A%22Coral%22%2C%22always_online%22%3Afalse%7D%7D%7D).

      For more details, see the [Slack app setup guide](https://docs.slack.dev/app-management/quickstart-app-settings).
base_url: https://slack.com
auth:
  type: HeaderAuth
  headers:
    - name: Authorization
      from: template
      template: Bearer {{input.SLACK_TOKEN}}
test_queries:
  - SELECT * FROM slack.channels LIMIT 1
  - >
    SELECT ts, thread_ts, text, files, attachments, blocks, file_id,
    file_name, file_title, file_mimetype, file_filetype, file_url_private,
    file_url_private_download, file_thumb_360, file_thumb_720, file_ids,
    attachment_image_urls, block_types
    FROM slack.messages
    WHERE channel = 'C0AFMHJTMK8'
      AND thread_ts = '1777984891.794389'
      AND ts = CAST('2026-05-06T09:13:30.599469Z' AS TIMESTAMP)
  - >
    SELECT ts, text, files, attachments, blocks, file_id, file_name,
    file_title, file_mimetype, file_filetype, file_url_private,
    file_url_private_download, file_thumb_360, file_thumb_720, file_ids,
    attachment_image_urls, block_image_urls
    FROM slack.thread_replies
    WHERE channel = 'C061S50CQN6'
      AND thread_ts = '1778134793.636129'
      AND ts IN (
        CAST('2026-05-07T09:13:40.100149Z' AS TIMESTAMP),
        CAST('2026-05-07T09:20:23.517609Z' AS TIMESTAMP),
        CAST('2026-05-07T11:26:51.125419Z' AS TIMESTAMP)
      )
tables:
  - name: channels
    description: Slack channels with topic, purpose, and member count
    guide: |
      Start here to inventory channels. Use `id` values from here in
      related tables and drill-down queries.
    request:
      method: GET
      path: /api/conversations.list
      query:
        - name: types
          from: literal
          value: public_channel,private_channel
    response:
      ok_path:
        - ok
      error_path:
        - error
      rows_path:
        - channels
    pagination:
      mode: cursor_query
      page_size:
        default: 200
        max: 200
        query_param: limit
      cursor_param: cursor
      response_cursor_path:
        - response_metadata
        - next_cursor
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Channel ID
        expr:
          kind: path
          path:
            - id
      - name: name
        type: Utf8
        nullable: false
        description: Channel name
        expr:
          kind: path
          path:
            - name
      - name: topic
        type: Utf8
        nullable: true
        description: Channel topic text
        expr:
          kind: path
          path:
            - topic
            - value
      - name: purpose
        type: Utf8
        nullable: true
        description: Channel purpose text
        expr:
          kind: path
          path:
            - purpose
            - value
      - name: num_members
        type: Int64
        nullable: true
        description: Number of members in the channel
        expr:
          kind: path
          path:
            - num_members
      - name: is_archived
        type: Boolean
        nullable: false
        description: Whether the channel is archived
        expr:
          kind: path
          path:
            - is_archived
      - name: created
        type: Int64
        nullable: false
        description: Unix timestamp when the channel was created
        expr:
          kind: path
          path:
            - created
  - name: messages
    description: Messages in a Slack channel (requires channel filter)
    guide: |
      Use this table for Messages in a Slack channel (requires channel
      filter). Requires `channel` from `slack.channels`. `oldest` and
      `latest` are Slack API timestamp filters: pass raw Slack timestamp
      strings such as `1777593600.000000`, not ISO-8601 timestamps. The
      returned `ts` column is a normal UTC `Timestamp`, so use SQL
      predicates such as `ts >= CAST('2026-05-01T00:00:00Z' AS TIMESTAMP)`
      when you want ISO-style filtering after the channel history is fetched.

      Rich message payloads are exposed as `files`, `attachments`, and
      `blocks` JSON columns, with the first attached file flattened into
      convenience columns like `file_id`, `file_name`, and
      `file_url_private_download`. The full arrays are also joined into
      compact string columns such as `file_ids`, `attachment_image_urls`,
      and `block_image_urls` when you want to inspect every value without
      unpacking JSON manually.

      Example:

      ```sql
      SELECT ts, text, files, attachments, blocks
      FROM slack.messages
      WHERE channel = 'C0AFMHJTMK8'
      ORDER BY ts;
      ```

      To inspect the first attached file directly:

      ```sql
      SELECT ts, file_id, file_name, file_mimetype, file_url_private_download
      FROM slack.messages
      WHERE channel = 'C0AFMHJTMK8' AND file_id IS NOT NULL;
      ```
    request:
      method: GET
      path: /api/conversations.history
      query:
        - name: channel
          from: filter
          key: channel
        - name: oldest
          from: filter
          key: oldest
        - name: latest
          from: filter
          key: latest
    response:
      ok_path:
        - ok
      error_path:
        - error
      rows_path:
        - messages
    pagination:
      mode: cursor_query
      page_size:
        default: 200
        max: 200
        query_param: limit
      cursor_param: cursor
      response_cursor_path:
        - response_metadata
        - next_cursor
    columns:
      - name: channel
        type: Utf8
        nullable: false
        description: Channel ID (required filter to specify which channel)
        expr:
          kind: from_filter
          key: channel
      - name: user_id
        type: Utf8
        nullable: true
        description: User ID of the message author
        expr:
          kind: path
          path:
            - user
      - name: text
        type: Utf8
        nullable: true
        description: Message text content
        expr:
          kind: path
          path:
            - text
      - name: files
        type: Json
        nullable: true
        description: Raw file payloads attached to the message
        expr:
          kind: path
          path:
            - files
      - name: attachments
        type: Json
        nullable: true
        description: Raw legacy attachment payloads attached to the message
        expr:
          kind: path
          path:
            - attachments
      - name: blocks
        type: Json
        nullable: true
        description: Raw block payloads attached to the message
        expr:
          kind: path
          path:
            - blocks
      - name: file_id
        type: Utf8
        nullable: true
        description: ID of the first attached file, if any
        expr:
          kind: first_array_item_path
          path:
            - files
          item_path:
            - id
      - name: file_name
        type: Utf8
        nullable: true
        description: Name of the first attached file, if any
        expr:
          kind: first_array_item_path
          path:
            - files
          item_path:
            - name
      - name: file_title
        type: Utf8
        nullable: true
        description: Title of the first attached file, if any
        expr:
          kind: first_array_item_path
          path:
            - files
          item_path:
            - title
      - name: file_mimetype
        type: Utf8
        nullable: true
        description: MIME type of the first attached file, if any
        expr:
          kind: first_array_item_path
          path:
            - files
          item_path:
            - mimetype
      - name: file_filetype
        type: Utf8
        nullable: true
        description: Slack file type of the first attached file, if any
        expr:
          kind: first_array_item_path
          path:
            - files
          item_path:
            - filetype
      - name: file_url_private
        type: Utf8
        nullable: true
        description: Private URL of the first attached file, if any
        expr:
          kind: first_array_item_path
          path:
            - files
          item_path:
            - url_private
      - name: file_url_private_download
        type: Utf8
        nullable: true
        description: Download URL of the first attached file, if any
        expr:
          kind: first_array_item_path
          path:
            - files
          item_path:
            - url_private_download
      - name: file_thumb_360
        type: Utf8
        nullable: true
        description: 360px thumbnail URL of the first attached file, if any
        expr:
          kind: first_array_item_path
          path:
            - files
          item_path:
            - thumb_360
      - name: file_thumb_720
        type: Utf8
        nullable: true
        description: 720px thumbnail URL of the first attached file, if any
        expr:
          kind: first_array_item_path
          path:
            - files
          item_path:
            - thumb_720
      - name: file_ids
        type: Utf8
        nullable: true
        description: IDs of all attached files, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - files
          item_path:
            - id
          separator: " | "
      - name: file_names
        type: Utf8
        nullable: true
        description: Names of all attached files, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - files
          item_path:
            - name
          separator: " | "
      - name: file_titles
        type: Utf8
        nullable: true
        description: Titles of all attached files, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - files
          item_path:
            - title
          separator: " | "
      - name: file_mimetypes
        type: Utf8
        nullable: true
        description: MIME types of all attached files, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - files
          item_path:
            - mimetype
          separator: " | "
      - name: file_filetypes
        type: Utf8
        nullable: true
        description: Slack file types of all attached files, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - files
          item_path:
            - filetype
          separator: " | "
      - name: file_url_privates
        type: Utf8
        nullable: true
        description: Private URLs of all attached files, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - files
          item_path:
            - url_private
          separator: " | "
      - name: file_url_private_downloads
        type: Utf8
        nullable: true
        description: Download URLs of all attached files, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - files
          item_path:
            - url_private_download
          separator: " | "
      - name: file_thumb_360s
        type: Utf8
        nullable: true
        description: 360px thumbnail URLs of all attached files, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - files
          item_path:
            - thumb_360
          separator: " | "
      - name: file_thumb_720s
        type: Utf8
        nullable: true
        description: 720px thumbnail URLs of all attached files, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - files
          item_path:
            - thumb_720
          separator: " | "
      - name: attachment_titles
        type: Utf8
        nullable: true
        description: Titles of all legacy attachments, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - attachments
          item_path:
            - title
          separator: " | "
      - name: attachment_title_links
        type: Utf8
        nullable: true
        description: Title links of all legacy attachments, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - attachments
          item_path:
            - title_link
          separator: " | "
      - name: attachment_image_urls
        type: Utf8
        nullable: true
        description: Image URLs of all legacy attachments, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - attachments
          item_path:
            - image_url
          separator: " | "
      - name: block_types
        type: Utf8
        nullable: true
        description: Types of all message blocks, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - blocks
          item_path:
            - type
          separator: " | "
      - name: block_image_urls
        type: Utf8
        nullable: true
        description: Image URLs from all image blocks, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - blocks
          item_path:
            - image_url
          separator: " | "
      - name: ts
        type: Timestamp
        nullable: false
        description: Message time from Slack `ts`, exposed as a UTC Timestamp
        expr:
          kind: format_timestamp
          input: seconds
          expr:
            kind: path
            path:
              - ts
      - name: permalink
        type: Utf8
        nullable: false
        description: Deep link to the message in Slack
        expr:
          kind: template
          template: "https://slack.com/archives/{{filter.channel}}/p{{expr.ts_id}}"
          values:
            ts_id:
              kind: replace
              expr:
                kind: path
                path:
                  - ts
              from: "."
              to: ""
      - name: thread_ts
        type: Utf8
        nullable: true
        description: Thread parent timestamp (null if not in a thread)
        expr:
          kind: path
          path:
            - thread_ts
      - name: reply_count
        type: Int64
        nullable: true
        description: Number of replies in thread
        expr:
          kind: path
          path:
            - reply_count
      - name: subtype
        type: Utf8
        nullable: true
        description: Message subtype
        expr:
          kind: path
          path:
            - subtype
      - name: oldest
        type: Utf8
        nullable: true
        description: Oldest Slack raw `ts` filter such as `1777593600.000000`; not ISO-8601 (virtual)
        expr:
          kind: "null"
        virtual: true
      - name: latest
        type: Utf8
        nullable: true
        description: Latest Slack raw `ts` filter such as `1777593600.000000`; not ISO-8601 (virtual)
        expr:
          kind: "null"
        virtual: true
    filters:
      - name: channel
        required: true
      - name: oldest
      - name: latest
  - name: thread_replies
    description: Slack thread replies for a specific channel and parent message
    guide: |
      Requires both `channel` and raw `thread_ts`. Start from
      `slack.messages` with a channel filter, find a parent message with
      `reply_count > 0`, then pass that row's `thread_ts` when present or
      its raw Slack message timestamp as `thread_ts`. The `oldest` and
      `latest` filters also expect raw Slack timestamp strings such as
      `1777593600.000000`, not ISO-8601 timestamps.

      Rich reply payloads are exposed in the same way as channel history,
      with `files`, `attachments`, and `blocks` JSON columns plus the
      flattened first-file convenience columns. The array-joined
      convenience columns like `file_ids`, `attachment_image_urls`, and
      `block_image_urls` make it easy to inspect multiple files or image
      previews in one row.

      Example:

      ```sql
      SELECT ts, text, files, attachments, blocks, file_id, file_name
      FROM slack.thread_replies
      WHERE channel = 'C061S50CQN6'
        AND thread_ts = '1778134793.636129'
      ORDER BY ts;
      ```
    request:
      method: GET
      path: /api/conversations.replies
      query:
        - name: channel
          from: filter
          key: channel
        - name: ts
          from: filter
          key: thread_ts
        - name: oldest
          from: filter
          key: oldest
        - name: latest
          from: filter
          key: latest
        - name: inclusive
          from: filter
          key: inclusive
        - name: include_all_metadata
          from: filter
          key: include_all_metadata
    response:
      ok_path:
        - ok
      error_path:
        - error
      rows_path:
        - messages
    pagination:
      mode: cursor_query
      page_size:
        default: 200
        max: 200
        query_param: limit
      cursor_param: cursor
      response_cursor_path:
        - response_metadata
        - next_cursor
    columns:
      - name: channel
        type: Utf8
        nullable: false
        description: Channel ID (required filter to specify which channel)
        expr:
          kind: from_filter
          key: channel
      - name: thread_ts
        type: Utf8
        nullable: false
        description: Thread parent timestamp (required filter)
        expr:
          kind: from_filter
          key: thread_ts
      - name: user_id
        type: Utf8
        nullable: true
        description: User ID of the reply author
        expr:
          kind: path
          path:
            - user
      - name: text
        type: Utf8
        nullable: true
        description: Reply text content
        expr:
          kind: path
          path:
            - text
      - name: files
        type: Json
        nullable: true
        description: Raw file payloads attached to the reply
        expr:
          kind: path
          path:
            - files
      - name: attachments
        type: Json
        nullable: true
        description: Raw legacy attachment payloads attached to the reply
        expr:
          kind: path
          path:
            - attachments
      - name: blocks
        type: Json
        nullable: true
        description: Raw block payloads attached to the reply
        expr:
          kind: path
          path:
            - blocks
      - name: file_id
        type: Utf8
        nullable: true
        description: ID of the first attached file, if any
        expr:
          kind: first_array_item_path
          path:
            - files
          item_path:
            - id
      - name: file_name
        type: Utf8
        nullable: true
        description: Name of the first attached file, if any
        expr:
          kind: first_array_item_path
          path:
            - files
          item_path:
            - name
      - name: file_title
        type: Utf8
        nullable: true
        description: Title of the first attached file, if any
        expr:
          kind: first_array_item_path
          path:
            - files
          item_path:
            - title
      - name: file_mimetype
        type: Utf8
        nullable: true
        description: MIME type of the first attached file, if any
        expr:
          kind: first_array_item_path
          path:
            - files
          item_path:
            - mimetype
      - name: file_filetype
        type: Utf8
        nullable: true
        description: Slack file type of the first attached file, if any
        expr:
          kind: first_array_item_path
          path:
            - files
          item_path:
            - filetype
      - name: file_url_private
        type: Utf8
        nullable: true
        description: Private URL of the first attached file, if any
        expr:
          kind: first_array_item_path
          path:
            - files
          item_path:
            - url_private
      - name: file_url_private_download
        type: Utf8
        nullable: true
        description: Download URL of the first attached file, if any
        expr:
          kind: first_array_item_path
          path:
            - files
          item_path:
            - url_private_download
      - name: file_thumb_360
        type: Utf8
        nullable: true
        description: 360px thumbnail URL of the first attached file, if any
        expr:
          kind: first_array_item_path
          path:
            - files
          item_path:
            - thumb_360
      - name: file_thumb_720
        type: Utf8
        nullable: true
        description: 720px thumbnail URL of the first attached file, if any
        expr:
          kind: first_array_item_path
          path:
            - files
          item_path:
            - thumb_720
      - name: file_ids
        type: Utf8
        nullable: true
        description: IDs of all attached files, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - files
          item_path:
            - id
          separator: " | "
      - name: file_names
        type: Utf8
        nullable: true
        description: Names of all attached files, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - files
          item_path:
            - name
          separator: " | "
      - name: file_titles
        type: Utf8
        nullable: true
        description: Titles of all attached files, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - files
          item_path:
            - title
          separator: " | "
      - name: file_mimetypes
        type: Utf8
        nullable: true
        description: MIME types of all attached files, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - files
          item_path:
            - mimetype
          separator: " | "
      - name: file_filetypes
        type: Utf8
        nullable: true
        description: Slack file types of all attached files, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - files
          item_path:
            - filetype
          separator: " | "
      - name: file_url_privates
        type: Utf8
        nullable: true
        description: Private URLs of all attached files, joined with ` | `
        expr:
          kind: join_array_path
          path:
            - files
