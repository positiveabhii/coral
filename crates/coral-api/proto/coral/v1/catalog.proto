syntax = "proto3";

package coral.v1;

import "coral/v1/resources.proto";

// Relation operations supported by a query-visible relation.
enum RelationOperation {
  // Operation was not specified.
  RELATION_OPERATION_UNSPECIFIED = 0;
  // Relation supports SELECT.
  RELATION_OPERATION_READ = 1;
  // Relation supports INSERT.
  RELATION_OPERATION_INSERT = 2;
  // Relation supports UPDATE.
  RELATION_OPERATION_UPDATE = 3;
  // Relation supports DELETE.
  RELATION_OPERATION_DELETE = 4;
  // Relation supports TRUNCATE.
  RELATION_OPERATION_TRUNCATE = 5;
}

// Write behavior for one column.
message ColumnWriteBehavior {
  // Whether the column is used as a direct write target key.
  bool is_key = 1;
  // Whether the column can be assigned or inserted through a write operation.
  bool is_writable = 2;
  // Whether inserts must provide this writable column.
  bool required_on_insert = 3;
}

// A column exposed by a discoverable SQL relation.
message Column {
  // The column name as exposed by the query engine.
  string name = 1;
  // The DataFusion/Arrow data type rendered as text.
  string data_type = 2;
  // Whether the column can contain null values.
  bool nullable = 3;
  // Whether the column is provider-derived metadata, such as a filter or computed column.
  bool is_virtual = 4;
  // Whether the column must be constrained before querying the table.
  bool is_required_filter = 5;
  // Human-readable column description.
  string description = 6;
  // Zero-based position of the column within the table.
  uint32 ordinal_position = 7;
  // Write behavior for this column.
  ColumnWriteBehavior write_behavior = 8;
}

// Capabilities exposed by one query-visible relation.
message RelationCapabilities {
  // Supported SQL operations.
  repeated RelationOperation operations = 1;
  // Direct-key columns required by relation write operations.
  repeated string derived_key_columns = 2;
  // Highest effect class exposed by this relation: read, write, or destructive.
  string effect = 3;
}

// A query-visible relation in one workspace.
message Relation {
  // Workspace whose source set makes this relation visible.
  Workspace workspace = 1;
  // The schema name used for SQL qualification.
  string schema_name = 2;
  // The bare relation name within the schema.
  string name = 3;
  // The user-facing relation description.
  string description = 4;
  // The columns exposed by the relation.
  repeated Column columns = 5;
  // Required filter names, if any.
  repeated string required_filters = 6;
  // User-facing query guidance.
  string guide = 7;
  // Relation operation and effect metadata.
  RelationCapabilities capabilities = 8;
}

// Relation metadata without full column definitions.
message RelationSummary {
  // Workspace that scopes this relation.
  Workspace workspace = 1;
  // Source schema that owns the relation.
  string schema_name = 2;
  // Relation name within the schema.
  string name = 3;
  // Human-readable relation description.
  string description = 4;
  // Filter names that must be constrained when querying this relation.
  repeated string required_filters = 5;
  // User-facing query guidance.
  string guide = 6;
  // Relation operation and effect metadata.
  RelationCapabilities capabilities = 7;
}
