syntax = "proto3";

package coral.v1;

import "coral/v1/resources.proto";

// Explicit SQL NULL parameter value.
message SqlNullParameterValue {}

// One SQL parameter value.
message SqlParameterValue {
  // Supported first-version parameter value kinds.
  oneof kind {
    // SQL NULL.
    SqlNullParameterValue null_value = 1;
    // Boolean parameter.
    bool bool_value = 2;
    // Signed 64-bit integer parameter.
    int64 int64_value = 3;
    // 64-bit floating point parameter.
    double float64_value = 4;
    // UTF-8 string parameter.
    string string_value = 5;
  }
}

// Positional SQL parameter values, bound to `$1`, `$2`, and so on.
message SqlPositionalParameters {
  // Parameter values in placeholder order.
  repeated SqlParameterValue values = 1;
}

// Named SQL parameter values, bound to `$name` placeholders.
message SqlNamedParameters {
  // Parameter values keyed by placeholder name without the leading `$`.
  map<string, SqlParameterValue> values = 1;
}

// Executes one SQL statement against the sources registered in one workspace.
message ExecuteSqlRequest {
  // Workspace that scopes the queryable source set.
  Workspace workspace = 1;
  // One read-only SQL statement.
  string sql = 2;
  // Optional SQL parameter values.
  oneof parameters {
    // Positional parameter values for `$1`, `$2`, and so on.
    SqlPositionalParameters positional_params = 3;
    // Named parameter values for `$name` placeholders.
    SqlNamedParameters named_params = 4;
  }
}

// Fully materialized query result encoded as Arrow IPC bytes.
message ExecuteSqlResponse {
  // Arrow IPC stream bytes containing zero or more record batches plus schema.
  bytes arrow_ipc_stream = 1;
  // Total row count returned by the query.
  int64 row_count = 2;
}

// Explains one SQL statement by producing query-engine plan renderings without
// executing it.
message ExplainSqlRequest {
  // Workspace that scopes the queryable source set.
  Workspace workspace = 1;
  // One read-only SQL statement.
  string sql = 2;
}

// Query-engine plan renderings for one SQL statement.
message QueryPlan {
  // Parsed logical plan before logical optimization.
  string unoptimized_logical_plan = 1;
  // Logical plan after logical optimization.
  string optimized_logical_plan = 2;
  // Physical execution plan after physical optimization.
  string physical_plan = 3;
}

// SQL explanation response.
message ExplainSqlResponse {
  // Generated query plan.
  QueryPlan plan = 1;
}

// SQL query execution APIs.
service QueryService {
  // Executes one read-only SQL statement and returns the full result set.
  rpc ExecuteSql(ExecuteSqlRequest) returns (ExecuteSqlResponse);
  // Explains one read-only SQL statement without executing it.
  rpc ExplainSql(ExplainSqlRequest) returns (ExplainSqlResponse);
}
