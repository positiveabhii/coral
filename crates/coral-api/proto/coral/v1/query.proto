syntax = "proto3";

package coral.v1;

import "coral/v1/catalog.proto";
import "coral/v1/resources.proto";

// Executes one SQL statement against the sources registered in one workspace.
message ExecuteSqlRequest {
  // Workspace that scopes the queryable source set.
  Workspace workspace = 1;
  // One SQL statement.
  string sql = 2;
}

// Effect summary for one executed SQL statement.
message SqlExecutionSummary {
  // Statement kind such as select, insert, update, delete, truncate, or explain.
  string statement_kind = 1;
  // Effect class: read, write, or destructive.
  string effect = 2;
  // Provider rows affected by DML. Zero for read statements.
  uint64 affected_row_count = 3;
}

// Fully materialized query result encoded as Arrow IPC bytes.
message ExecuteSqlResponse {
  // Arrow IPC stream bytes containing zero or more record batches plus schema.
  bytes arrow_ipc_stream = 1;
  // Rows returned by the result stream.
  int64 row_count = 2;
  // Execution effect metadata for the statement.
  SqlExecutionSummary summary = 3;
}

// Explains one SQL statement by producing query-engine plan renderings without
// executing it.
message ExplainSqlRequest {
  // Workspace that scopes the queryable source set.
  Workspace workspace = 1;
  // One SQL statement.
  string sql = 2;
}

// Query-engine plan renderings for one SQL statement.
message QueryPlan {
  // Parsed logical plan before logical optimization.
  string unoptimized_logical_plan = 1;
  // Logical plan after logical optimization.
  string optimized_logical_plan = 2;
  // Physical execution plan after physical optimization.
  string physical_plan = 3;
}

// SQL explanation response.
message ExplainSqlResponse {
  // Generated query plan.
  QueryPlan plan = 1;
}

// Page request parameters for list-style APIs.
message PaginationRequest {
  // Maximum number of items to return. Zero means unbounded for compatibility.
  uint32 limit = 1;
  // Number of matching items to skip before returning results.
  uint32 offset = 2;
}

// Page metadata returned by list-style APIs.
message PaginationResponse {
  // Matching item count before pagination.
  uint32 total_count = 1;
  // Applied result limit. Zero means unbounded.
  uint32 limit = 2;
  // Applied result offset.
  uint32 offset = 3;
  // Whether another page is available.
  bool has_more = 4;
  // Offset to request for the next page when `has_more` is true.
  uint32 next_offset = 5;
}

// Lists all query-visible relations in one workspace.
message ListRelationsRequest {
  // Workspace whose current query-visible relations should be listed.
  Workspace workspace = 1;
  // Optional exact schema/source name.
  string schema_name = 2;
  // Optional page request. Missing or zero limit keeps the unbounded behavior.
  PaginationRequest pagination = 3;
  // Whether relation columns should be omitted from the response.
  bool omit_columns = 4;
  // Optional exact relation name. If set without `schema_name`, matches across all schemas.
  string relation_name = 5;
}

// Returns the query-visible relations in one workspace.
message ListRelationsResponse {
  // Full query-visible relations.
  repeated Relation relations = 1;
  // Page metadata for the relation list.
  PaginationResponse pagination = 2;
  // Query-visible relation summaries for callers that do not need columns.
  repeated RelationSummary relation_summaries = 3;
}

// SQL execution APIs.
service SqlService {
  // Lists query-visible relations for one workspace.
  rpc ListRelations(ListRelationsRequest) returns (ListRelationsResponse);
  // Executes one SQL statement and returns the full result set.
  rpc ExecuteSql(ExecuteSqlRequest) returns (ExecuteSqlResponse);
  // Explains one SQL statement without executing it.
  rpc ExplainSql(ExplainSqlRequest) returns (ExplainSqlResponse);
}
