syntax = "proto3";

package coral.spec.v1;

message SourceManifest {
  string api_version = 1;
  string kind = 2;
  string name = 3;
  string version = 4;
  uint32 dsl_version = 5;
  SourceBackend backend = 6;
  string description = 7;
  repeated string test_queries = 8;
  repeated SourceInputBinding inputs = 9;
  string base_url = 10;
  AuthSpec auth = 11;
  RateLimitSpec rate_limit = 12;
  repeated TableSpec tables = 13;
}

enum SourceBackend {
  SOURCE_BACKEND_UNSPECIFIED = 0;
  SOURCE_BACKEND_HTTP = 1;
  SOURCE_BACKEND_PARQUET = 2;
  SOURCE_BACKEND_JSONL = 3;
}

message SourceInputBinding {
  string key = 1;
  SourceInput input = 2;
}

message SourceInput {
  SourceInputKind kind = 1;
  optional string default_value = 2;
  optional bool required = 3;
  string hint = 4;
}

enum SourceInputKind {
  SOURCE_INPUT_KIND_UNSPECIFIED = 0;
  SOURCE_INPUT_KIND_VARIABLE = 1;
  SOURCE_INPUT_KIND_SECRET = 2;
}

message AuthSpec {
  repeated HeaderSpec headers = 1;
}

message HeaderSpec {
  string name = 1;
  ValueSource value = 2;
}

message RateLimitSpec {
  repeated uint32 extra_statuses = 1;
  optional string retry_after_header = 2;
  optional string remaining_header = 3;
  optional string reset_header = 4;
}

message TableSpec {
  string name = 1;
  string description = 2;
  string guide = 3;
  repeated FilterSpec filters = 4;
  optional uint64 fetch_limit_default = 5;
  RequestSpec request = 6;
  repeated RequestRouteSpec requests = 7;
  ResponseSpec response = 8;
  PaginationSpec pagination = 9;
  FileSourceSpec source = 10;
  repeated ColumnSpec columns = 11;
}

message FilterSpec {
  string name = 1;
  bool required = 2;
  FilterMode mode = 3;
}

enum FilterMode {
  FILTER_MODE_UNSPECIFIED = 0;
  FILTER_MODE_EQUALITY = 1;
  FILTER_MODE_SEARCH = 2;
  FILTER_MODE_CONTAINS = 3;
}

message RequestSpec {
  HttpMethod method = 1;
  string path = 2;
  repeated QueryParamSpec query = 3;
  repeated BodyFieldSpec body = 4;
  repeated HeaderSpec headers = 5;
}

enum HttpMethod {
  HTTP_METHOD_UNSPECIFIED = 0;
  HTTP_METHOD_GET = 1;
  HTTP_METHOD_POST = 2;
}

message RequestRouteSpec {
  repeated string when_filters = 1;
  RequestSpec request = 2;
}

message QueryParamSpec {
  string name = 1;
  ValueSource value = 2;
  optional bool explode = 3;
}

message BodyFieldSpec {
  repeated string path = 1;
  ValueSource value = 2;
}

message ValueSource {
  oneof kind {
    TemplateValue template = 1;
    LiteralValue literal = 2;
    FilterValue filter = 3;
    FilterIntValue filter_int = 4;
    InputValue input = 5;
    StateValue state = 6;
    NowEpochMinusSecondsValue now_epoch_minus_seconds = 7;
  }
}

message TemplateValue {
  string template = 1;
}

message LiteralValue {
  string json = 1;
}

message FilterValue {
  string key = 1;
  optional string default_json = 2;
}

message FilterIntValue {
  string key = 1;
  optional int64 default_value = 2;
}

message InputValue {
  string key = 1;
}

message StateValue {
  string key = 1;
}

message NowEpochMinusSecondsValue {
  int64 seconds = 1;
}

message ResponseSpec {
  repeated string rows_path = 1;
  repeated string ok_path = 2;
  repeated string error_path = 3;
  bool allow_404_empty = 4;
  RowStrategy row_strategy = 5;
}

enum RowStrategy {
  ROW_STRATEGY_UNSPECIFIED = 0;
  ROW_STRATEGY_DIRECT = 1;
  ROW_STRATEGY_SERIES_POINT_LIST = 2;
  ROW_STRATEGY_DICT_ENTRIES = 3;
}

message PaginationSpec {
  PaginationMode mode = 1;
  PageSizeSpec page_size = 2;
  optional string cursor_param = 3;
  repeated string cursor_body_path = 4;
  repeated string response_cursor_path = 5;
  optional string page_param = 6;
  int64 page_start = 7;
  optional int64 page_step = 8;
  optional string offset_param = 9;
  int64 offset_start = 10;
  optional int64 offset_step = 11;
  bool link_header_require_results = 12;
  optional uint64 max_pages = 13;
}

enum PaginationMode {
  PAGINATION_MODE_UNSPECIFIED = 0;
  PAGINATION_MODE_NONE = 1;
  PAGINATION_MODE_AUTO = 2;
  PAGINATION_MODE_CURSOR_QUERY = 3;
  PAGINATION_MODE_CURSOR_BODY = 4;
  PAGINATION_MODE_PAGE = 5;
  PAGINATION_MODE_OFFSET = 6;
  PAGINATION_MODE_LINK_HEADER = 7;
}

message PageSizeSpec {
  uint64 default_size = 1;
  uint64 max = 2;
  optional string query_param = 3;
  repeated string body_path = 4;
}

message FileSourceSpec {
  string location = 1;
  optional string glob = 2;
  repeated PartitionColumnSpec partitions = 3;
}

message PartitionColumnSpec {
  string name = 1;
  string data_type = 2;
}

message ColumnSpec {
  string name = 1;
  string data_type = 2;
  optional bool nullable = 3;
  bool virtual = 4;
  string description = 5;
  ExprSpec expr = 6;
}

message ExprSpec {
  oneof kind {
    PathExpr path = 1;
    CoalesceExpr coalesce = 2;
    FromFilterExpr from_filter = 3;
    LiteralExpr literal = 4;
    NullExpr null_value = 5;
    JoinArrayExpr join_array = 6;
    TagValueExpr tag_value = 7;
    IfPresentExpr if_present = 8;
    JoinTagValuesExpr join_tag_values = 9;
    FirstArrayItemPathExpr first_array_item_path = 10;
    ObjectFilterPathExpr object_filter_path = 11;
    CurrentRowExpr current_row = 12;
    FormatTimestampExpr format_timestamp = 13;
    ReplaceExpr replace = 14;
    TemplateExpr template = 15;
  }
}

message PathExpr {
  repeated string path = 1;
}

message CoalesceExpr {
  repeated ExprSpec exprs = 1;
}

message FromFilterExpr {
  string key = 1;
}

message LiteralExpr {
  string json = 1;
}

message NullExpr {}

message JoinArrayExpr {
  repeated string path = 1;
  optional string separator = 2;
}

message TagValueExpr {
  repeated string path = 1;
  string key = 2;
  optional string key_field = 3;
  optional string value_field = 4;
}

message IfPresentExpr {
  ExprSpec check = 1;
  string then_value = 2;
}

message JoinTagValuesExpr {
  repeated string path = 1;
  string key = 2;
  optional string key_field = 3;
  optional string value_field = 4;
  optional string separator = 5;
}

message FirstArrayItemPathExpr {
  repeated string path = 1;
  repeated string item_path = 2;
}

message ObjectFilterPathExpr {
  repeated string path = 1;
  string filter_key = 2;
  repeated string item_path = 3;
}

message CurrentRowExpr {}

message FormatTimestampExpr {
  ExprSpec expr = 1;
  TimestampInput input = 2;
}

enum TimestampInput {
  TIMESTAMP_INPUT_UNSPECIFIED = 0;
  TIMESTAMP_INPUT_SECONDS = 1;
  TIMESTAMP_INPUT_MILLISECONDS = 2;
}

message ReplaceExpr {
  ExprSpec expr = 1;
  string from = 2;
  string to = 3;
}

message TemplateExpr {
  string template = 1;
  map<string, ExprSpec> values = 2;
}
